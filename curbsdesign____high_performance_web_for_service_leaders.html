<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CURBSDESIGN® — High-Performance Web for Service Leaders</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: 'Geist', sans-serif;
            overflow-x: hidden;
        }
        .font-geist { font-family: 'Geist', sans-serif; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #05070a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        .nav-link span { transform: scaleX(0); transition: transform 0.3s ease; }
        .nav-link:hover span { transform: scaleX(1); }

        .cms-shimmer {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.05) 25%, rgba(59, 130, 246, 0.1) 50%, rgba(59, 130, 246, 0.05) 75%);
            background-size: 200% 100%;
            animation: shimmer 2s infinite;
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Icon = ({ name, className }) => {
            const icons = {
                arrowUpRight: <path d="M7 7h10v10M7 17 17 7" />,
                asterisk: <path d="M12 6v12M17.196 9 6.804 15m0-6 10.392 6" />,
                check: <path d="M20 6 9 17l-5-5" />
            };
            return (
                <svg 
                    xmlns="http://www.w3.org/2000/svg" 
                    width="24" height="24" 
                    viewBox="0 0 24 24" 
                    fill="none" 
                    stroke="currentColor" 
                    strokeWidth="1.5" 
                    strokeLinecap="round" 
                    strokeLinejoin="round" 
                    className={className}
                >
                    {icons[name]}
                </svg>
            );
        };

        const App = () => {
            useEffect(() => {
                gsap.registerPlugin(ScrollTrigger);
                
                // Lenis Smooth Scroll
                const lenis = new Lenis({ duration: 1.3, smoothWheel: true });
                lenis.on('scroll', ScrollTrigger.update);
                gsap.ticker.add((time) => lenis.raf(time * 1000));
                gsap.ticker.lagSmoothing(0);
                lenis.stop();

                // Loader Logic
                const counter = { v: 0 };
                const tl = gsap.timeline({
                    onComplete: () => {
                        lenis.start();
                        initAnimations();
                    }
                });

                tl.to('#loaderBrand', { opacity: 1, filter: 'blur(0px)', duration: 1.2, ease: 'power3.out' })
                  .to('#loaderBar', { scaleX: 1, duration: 1.8, ease: 'power2.inOut' }, '-=0.6')
                  .to(counter, { 
                      v: 100, 
                      duration: 1.8, 
                      ease: 'power2.inOut',
                      onUpdate: () => document.getElementById('loaderCount').textContent = Math.round(counter.v).toString().padStart(3, '0')
                  }, '<')
                  .to('#loader', { yPercent: -100, duration: 1, ease: 'power4.inOut', delay: 0.2 })
                  .set('#loader', { display: 'none' });

                const initAnimations = () => {
                    // Hero Scrub
                    const heroScrub = gsap.timeline({
                        scrollTrigger: { trigger: '#hero', start: 'top top', end: '+=150%', pin: true, scrub: 1.5 }
                    });
                    heroScrub
                        .to('#wordmark', { yPercent: -60, ease: 'none', duration: 1 }, 0)
                        .to('#heroCopy, #metaCard', { opacity: 0, y: -40, ease: 'power1.inOut', duration: 0.6 }, 0)
                        .to('#cardStack', { y: -80, scale: 1.05, ease: 'none', duration: 1 }, 0)
                        .to('.hero-card:nth-child(1)', { rotation: -4, ease: 'none', duration: 1 }, 0)
                        .to('.hero-card:nth-child(2)', { x: '-38vw', y: -50, rotation: -9, ease: 'none', duration: 1 }, 0)
                        .to('.hero-card:nth-child(3)', { x: '38vw', y: 50, rotation: 9, ease: 'none', duration: 1 }, 0)
                        .fromTo('#cardStack, #wordmark', { opacity: 1 }, { opacity: 0, ease: 'power1.in', duration: 0.35 }, 0.75);

                    // Pinned Typography
                    const lines = gsap.utils.toArray('.typo-line');
                    const typoTl = gsap.timeline({
                        scrollTrigger: { trigger: '#typo', start: 'top top', end: '+=160%', pin: true, scrub: 1 }
                    });
                    lines.forEach((l, i) => {
                        gsap.set(l, { xPercent: i % 2 ? 60 : -60, opacity: 0 });
                        typoTl.to(l, { xPercent: 0, opacity: 1, ease: 'none', duration: 1 }, i * 0.35);
                    });

                    // Reusable Reveals
                    gsap.utils.toArray('[data-reveal]').forEach(el => {
                        gsap.fromTo(el, { y: 50, opacity: 0 }, {
                            y: 0, opacity: 1, duration: 1.1, ease: 'power3.out',
                            scrollTrigger: { trigger: el, start: 'top 85%' }
                        });
                    });

                    // Archive Drift
                    const track = document.getElementById('archiveTrack');
                    gsap.to(track, {
                        x: () => -(track.scrollWidth - window.innerWidth + 48),
                        ease: 'none',
                        scrollTrigger: { trigger: '#archive', start: 'top bottom', end: 'bottom top', scrub: 1.2 }
                    });
                };
            }, []);

            return (
                <div className="relative">
                    {/* Loader */}
                    <div id="loader" className="fixed inset-0 z-[100] bg-[#05070a] flex flex-col items-center justify-center">
                        <div id="loaderBrand" className="text-5xl sm:text-7xl md:text-8xl text-white blur-xl opacity-0 font-geist tracking-tighter">
                            CURBSDESIGN<span className="text-blue-500">®</span>
                        </div>
                        <div className="w-48 sm:w-64 h-px bg-white/10 mt-10 overflow-hidden">
                            <div id="loaderBar" className="h-full w-full bg-blue-500 origin-left scale-x-0"></div>
                        </div>
                        <div id="loaderCount" className="mt-4 text-xs font-medium tracking-[0.3em] text-white/40 tabular-nums">000</div>
                    </div>

                    {/* Navigation */}
                    <header className="fixed top-0 inset-x-0 z-50 backdrop-blur-md bg-[#05070a]/40 border-b border-white/5">
                        <nav className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
                            <div className="flex items-center gap-8">
                                <a href="#" className="text-sm font-semibold tracking-tight">
                                    CURBSDESIGN<span className="text-blue-500">®</span>
                                </a>
                                <div className="hidden md:flex items-center gap-6">
                                    {['Agency', 'Solutions', 'Portfolio', 'Strategy', 'About'].map((item) => (
                                        <a key={item} href="#" className="nav-link relative text-sm text-white/60 hover:text-white transition-colors">
                                            {item}
                                            <span className="absolute -bottom-1 left-0 h-px w-full bg-blue-500 origin-left"></span>
                                        </a>
                                    ))}
                                </div>
                            </div>
                            <a href="#" className="group inline-flex items-center gap-2 text-xs font-semibold tracking-[0.2em] border border-white/20 rounded-full px-5 py-2.5 hover:bg-white hover:text-[#05070a] transition-all duration-300">
                                START PROJECT
                                <Icon name="arrowUpRight" className="w-3.5 h-3.5 transition-transform duration-300 group-hover:translate-x-0.5 group-hover:-translate-y-0.5" />
                            </a>
                        </nav>
                    </header>

                    {/* Hero Section */}
                    <section id="hero" className="relative h-screen flex flex-col justify-end overflow-hidden pt-24">
                        <div className="absolute inset-0 bg-gradient-to-b from-[#05070a] via-[#0a0c14] to-[#05070a]"></div>
                        <div className="relative z-10 max-w-7xl mx-auto px-6 w-full">
                            <h1 id="wordmark" className="select-none text-[18vw] leading-[0.85] text-center font-geist tracking-tighter">
                                CURBSDESIGN<span className="text-blue-500">®</span>
                            </h1>
                        </div>
                        <div id="cardStack" className="relative z-20 max-w-7xl mx-auto px-6 w-full pb-16 -mt-[6vw]">
                            <div className="relative h-[44vh] sm:h-[52vh]">
                                <div className="hero-card absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[72%] sm:w-[55%] md:w-[44%] aspect-[4/3] rounded-2xl overflow-hidden shadow-2xl shadow-black/60 ring-1 ring-white/10 z-30">
                                    <img src="https://images.unsplash.com/photo-1460925895917-afdab827c52f?q=80&w=2426&auto=format&fit=crop" alt="Web Design Mockup" className="w-full h-full object-cover" />
                                </div>
                                <div className="hero-card absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[58%] sm:w-[42%] md:w-[32%] aspect-[4/3] rounded-2xl overflow-hidden shadow-2xl shadow-black/60 ring-1 ring-white/10 z-20">
                                    <img src="https://images.unsplash.com/photo-1581578731522-745d0514224e?q=80&w=2070&auto=format&fit=crop" alt="Plumbing Service UI" className="w-full h-full object-cover" />
                                </div>
                                <div className="hero-card absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[58%] sm:w-[42%] md:w-[32%] aspect-[4/3] rounded-2xl overflow-hidden shadow-2xl shadow-black/60 ring-1 ring-white/10 z-10">
                                    <img src="https://images.unsplash.com/photo-1621905251189-08b45d6a269e?q=80&w=2069&auto=format&fit=crop" alt="HVAC Website Design" className="w-full h-full object-cover" />
                                </div>
                            </div>
                        </div>
                        <div id="metaCard" className="absolute bottom-8 right-6 z-30 hidden md:flex items-center gap-4 rounded-xl bg-white/5 backdrop-blur-xl ring-1 ring-white/10 p-4">
                            <div className="w-14 h-14 rounded-lg bg-blue-500/20 flex items-center justify-center">
                                <Icon name="check" className="text-blue-500 w-6 h-6" />
                            </div>
                            <div>
                                <p className="text-xs tracking-[0.25em] text-white/40">EST. 2016</p>
                                <p className="text-sm font-medium mt-1">Apex Roofing — Dallas, TX</p>
                            </div>
                        </div>
                        <div id="heroCopy" className="absolute bottom-8 left-6 z-30 max-w-xs">
                            <p className="text-sm text-white/50 leading-relaxed">
                                High-performance digital foundations for local service leaders. We build websites that drive real leads.
                            </p>
                        </div>
                    </section>

                    {/* Statement Section */}
                    <section className="relative bg-[#f8fafc] text-[#05070a] py-28 md:py-40">
                        <div className="max-w-7xl mx-auto px-6">
                            <h2 data-reveal className="text-3xl sm:text-4xl md:text-5xl leading-tight max-w-3xl font-geist tracking-tighter">
                                We dedicate ourselves to the 
                                <span className="inline-flex items-center justify-center align-middle w-8 h-8 rounded-md bg-blue-500 mx-1">
                                    <Icon name="asterisk" className="w-5 h-5 text-white" />
                                </span>
                                trades and the 
                                <span className="text-[#05070a]/30"> growth of local business through design.</span>
                            </h2>
                            <div className="grid md:grid-cols-3 gap-10 mt-20 items-start">
                                <div data-reveal>
                                    <span className="inline-flex items-center gap-2 text-xs font-semibold tracking-[0.2em] border border-[#05070a]/20 rounded-full px-4 py-2">
                                        <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                                        OUR MISSION
                                    </span>
                                </div>
                                <div data-reveal>
                                    <p className="text-sm leading-relaxed text-[#05070a]/60 max-w-sm">
                                        We are a specialized creative agency for the service industry. From HVAC to Dental practices, we guide business owners through the digital landscape with conversion-first strategies.
                                    </p>
                                    <a href="#" className="group inline-flex items-center gap-2 text-xs font-semibold tracking-[0.2em] mt-6 border-b border-[#05070a] pb-1">
                                        VIEW SOLUTIONS
                                        <Icon name="arrowUpRight" className="w-3.5 h-3.5 transition-transform duration-300 group-hover:translate-x-0.5 group-hover:-translate-y-0.5" />
                                    </a>
                                </div>
                                <div data-reveal className="md:text-right">
                                    <p className="text-6xl md:text-7xl font-geist tracking-tighter">
                                        480<span className="text-blue-500">+</span>
                                    </p>
                                    <p className="text-xs tracking-[0.2em] text-[#05070a]/40 mt-2">SITES LAUNCHED SINCE 2016</p>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Pinned Typography Section */}
                    <section id="typo" className="relative bg-[#05070a] h-screen overflow-hidden flex flex-col items-center justify-center">
                        <p className="typo-line text-[11vw] md:text-[8vw] leading-none font-geist tracking-tighter">THE ENGINE FOR</p>
                        <p className="typo-line text-[11vw] md:text-[8vw] leading-none text-blue-500 font-geist tracking-tighter">SERVICE BUSINESS</p>
                        <p className="typo-line text-[11vw] md:text-[8vw] leading-none font-geist tracking-tighter">DIGITAL GROWTH</p>
                        <span className="absolute top-24 right-6 inline-flex items-center gap-2 text-xs font-semibold tracking-[0.2em] border border-white/15 rounded-full px-4 py-2 text-white/60">
                            <span className="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                            CASE STUDIES
                        </span>
                    </section>

                    {/* Stats Section */}
                    <section className="relative bg-[#05070a] py-28">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="grid md:grid-cols-2 gap-12 items-end mb-20">
                                <h3 data-reveal className="text-3xl md:text-4xl leading-tight tracking-tighter">
                                    Transforming local brands into
                                    <span className="text-white/30"> digital market leaders with ease.</span>
                                </h3>
                                <p data-reveal className="text-sm text-white/40 leading-relaxed max-w-sm md:justify-self-end">
                                    Our data-driven approach ensures your website isn't just a business card, but a 24/7 sales machine that works as hard as you do.
                                </p>
                            </div>
                            <div className="grid sm:grid-cols-3 gap-4">
                                {[
                                    { val: '140', unit: '%', desc: 'Average increase in monthly lead volume for our service clients.' },
                                    { val: '88', unit: '%', desc: 'Client retention rate over the last 5 years of agency growth.' },
                                    { val: '99.9', unit: '%', desc: 'Uptime guarantee with our managed high-speed hosting stack.' }
                                ].map((stat, i) => (
                                    <div key={i} data-reveal className="rounded-2xl bg-white/[0.04] backdrop-blur-xl ring-1 ring-white/10 p-7 hover:-translate-y-1.5 transition-transform duration-500">
                                        <div className="flex items-start justify-between">
                                            <p className="text-5xl tracking-tighter">{stat.val}<span className="text-blue-500 text-2xl align-top">{stat.unit}</span></p>
                                            <Icon name="arrowUpRight" className="w-5 h-5 text-blue-500" />
                                        </div>
                                        <p className="text-sm text-white/40 mt-5 leading-relaxed">{stat.desc}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Portfolio Section */}
                    <section className="relative bg-[#05070a] py-28">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex flex-col md:flex-row md:items-end md:justify-between gap-8 mb-16">
                                <span data-reveal className="text-xs tracking-[0.25em] text-white/40">[ SELECTED WORK ]</span>
                                <h3 data-reveal className="text-4xl md:text-5xl md:text-right leading-tight tracking-tighter">RESULTS ARE<br/>BUILT-IN</h3>
                            </div>
                            <div className="grid md:grid-cols-3 gap-6">
                                {[
                                    { title: 'Apex Roofing UI', type: 'ROOFING', size: 'LEAD-GEN', img: 'https://images.unsplash.com/photo-1635424710928-0544e8512eae?q=80&w=2071&auto=format&fit=crop' },
                                    { title: 'Flow Plumbing Brand', type: 'PLUMBING', size: 'BRANDING', img: 'https://images.unsplash.com/photo-1504148455328-c376907d081c?q=80&w=2070&auto=format&fit=crop', offset: true },
                                    { title: 'Bright Electric SEO', type: 'ELECTRICAL', size: 'SEO FOCUS', img: 'https://images.unsplash.com/photo-1621905252507-b354bcadcabc?q=80&w=2070&auto=format&fit=crop', offset2: true }
                                ].map((proj, i) => (
                                    <a key={i} href="#" className={`group block hover:-translate-y-1.5 transition-transform duration-500 ${proj.offset ? 'md:mt-16' : ''} ${proj.offset2 ? 'md:mt-32' : ''}`}>
                                        <div className="overflow-hidden rounded-2xl aspect-[4/5]">
                                            <img src={proj.img} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" alt={proj.title} />
                                        </div>
                                        <div className="flex justify-between mt-4 text-xs tracking-[0.2em] text-white/40">
                                            <span>{proj.type}</span>
                                            <span>{proj.size}</span>
                                        </div>
                                        <p className="text-sm font-medium mt-1.5">{proj.title}</p>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Archive Section */}
                    <section id="archive" className="relative bg-[#05070a] py-20 overflow-hidden border-y border-white/5">
                        <p data-reveal className="text-xs tracking-[0.25em] text-white/40 px-6 max-w-7xl mx-auto mb-10">[ THE ARCHIVE — 2016 → TODAY ]</p>
                        <div id="archiveTrack" className="flex gap-5 pl-6" style={{ width: 'max-content' }}>
                            {[1,2,3,4,5,6].map(i => (
                                <div key={i} className="w-64 sm:w-80 aspect-[3/4] rounded-xl overflow-hidden shrink-0 ring-1 ring-white/10">
                                    <img src={`https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=800&auto=format&fit=crop&sig=${i}`} className="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-500" alt="Archive UI" />
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Process Section */}
                    <section id="process" className="relative bg-[#f8fafc] text-[#05070a] py-28 md:py-40">
                        <div className="max-w-7xl mx-auto px-6">
                            <span data-reveal className="text-xs tracking-[0.25em] text-[#05070a]/40">[ HOW WE WORK ]</span>
                            <h3 data-reveal className="text-4xl md:text-5xl mt-4 mb-20 tracking-tighter">THE PROCESS</h3>
                            <div className="space-y-14">
                                {[
                                    { id: '01', title: 'Discovery & Audit', time: 'WEEK 1' },
                                    { id: '02', title: 'Strategy & UX Map', time: 'WEEKS 2-3' },
                                    { id: '03', title: 'Design & Development', time: 'WEEKS 4-8' },
                                    { id: '04', title: 'Launch & Optimization', time: 'ONGOING' }
                                ].map((step, i) => (
                                    <div key={i} className="process-row">
                                        <div className="flex justify-between items-baseline mb-4">
                                            <p className="text-sm font-semibold">
                                                <span className="text-blue-500 mr-3">{step.id}</span>
                                                {step.title}
                                            </p>
                                            <p className="text-xs tracking-[0.2em] text-[#05070a]/40">{step.time}</p>
                                        </div>
                                        <div className="h-px bg-[#05070a]/10">
                                            <div className="process-bar h-full bg-blue-500 origin-left scale-x-0 transition-transform duration-1000"></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="relative bg-[#05070a] pt-28 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6">
                            <div className="flex justify-between text-xs tracking-[0.2em] text-white/40 border-b border-white/10 pb-8">
                                <span>EST. 16</span>
                                <span className="hidden sm:block">CONVERSION // SPEED // RELIABILITY</span>
                                <span>MENU</span>
                            </div>
                            <div className="text-center py-20">
                                <a data-reveal href="tel:+15125550198" className="block text-3xl sm:text-4xl md:text-5xl hover:text-white/70 transition-colors tracking-tighter">
                                    +1 (512) 555-0198
                                </a>
                                <a data-reveal href="mailto:hello@curbsdesign.com" className="block text-3xl sm:text-4xl md:text-5xl text-blue-500 mt-2 hover:text-blue-400 transition-colors tracking-tighter">
                                    hello@curbsdesign.com
                                </a>
                            </div>
                            <div className="grid sm:grid-cols-3 gap-8 text-xs text-white/40 pb-16">
                                <div>
                                    <p>ALL RIGHTS RESERVED.</p>
                                    <p className="mt-1">©2024 CURBSDESIGN</p>
                                </div>
                                <div className="sm:text-center">
                                    <p>801 CONGRESS AVE, AUSTIN</p>
                                    <p className="mt-1">TEXAS 78701</p>
                                </div>
                                <div className="sm:text-right space-x-4">
                                    <a href="#" className="hover:text-white transition-colors">INSTAGRAM</a>
                                    <a href="#" className="hover:text-white transition-colors">LINKEDIN</a>
                                    <a href="#" className="hover:text-white transition-colors">PRIVACY</a>
                                </div>
                            </div>
                        </div>
                        <p className="select-none text-[24vw] leading-[0.75] text-white/[0.04] text-center -mb-[4vw] font-geist tracking-tighter">
                            CURBSDESIGN
                        </p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
